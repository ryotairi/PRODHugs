openapi: 3.0.3
info:
  title: Hugs as a Service API
  version: 1.0.0
  description: Platform for hugging other users with rate limits, balance, and ranks
servers:
  - url: /api/v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Gender:
      type: string
      enum:
        - male
        - female

    ErrorCode:
      type: string
      enum:
        - WEAK_PASSWORD
        - USER_ALREADY_EXISTS
        - INVALID_CREDENTIALS
        - USER_NOT_FOUND
        - CANNOT_HUG_SELF
        - COOLDOWN_ACTIVE
        - INSUFFICIENT_BALANCE
        - WRONG_PASSWORD
        - USER_BANNED
        - CANNOT_BAN_ADMIN
        - ALREADY_HAS_PENDING_HUG
        - HUG_NOT_FOUND
        - HUG_NOT_PENDING
        - HUG_EXPIRED
        - DECLINE_COOLDOWN_ACTIVE
        - PENDING_HUG_EXISTS
        - MAX_SLOTS_REACHED
        - USER_BLOCKED
        - INVALID_TELEGRAM_ID
        - TELEGRAM_ID_TAKEN
        - TELEGRAM_LOGIN_FAILED
        - HUG_TYPE_LOCKED
        - CANNOT_DELETE_ADMIN
        - COMMENT_TOO_LONG
        - CAPTCHA_FAILED
        - CAPTCHA_REQUIRED

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code: { $ref: '#/components/schemas/ErrorCode' }
        message: { type: string }

    CaptchaType:
      type: string
      enum:
        - none
        - sudoku
        - casino

    User:
      type: object
      required:
        - id
        - username
        - role
        - captcha_type
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [user, admin] }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
          maxLength: 32
        telegram_id:
          type: integer
          format: int64
          nullable: true
        tag:
          type: string
          nullable: true
          maxLength: 20
        special_tag:
          type: string
          nullable: true
          maxLength: 20
        is_recently_active:
          type: boolean
          description: True if the user was active recently
        captcha_type:
          $ref: '#/components/schemas/CaptchaType'
        captcha_cooldown_until:
          type: string
          format: date-time
          nullable: true
        promoted_until:
          type: string
          format: date-time
          nullable: true
        promotion_message:
          type: string
          nullable: true
        promotion_bid:
          type: integer
          description: Current bid for this promotion spot
        vip_remaining_seconds:
          type: integer
          description: Remaining VIP time in seconds
        vip_cooldown_until:
          type: string
          format: date-time
          nullable: true
          description: When the user can bid again
        balance:
          type: integer
          description: User's current balance (returned for /users/me or own profile)

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token: { type: string }
        user : { $ref: '#/components/schemas/User' }

    HugType:
      type: string
      enum:
        - standard
        - bear
        - group
        - warm
        - soul

    IntimacyInfo:
      type: object
      required:
        - raw_score
        - tier
        - tier_name
        - cooldown_reduction_pct
        - available_hug_types
        - bonus_coins
      properties:
        raw_score: { type: integer }
        tier: { type: integer }
        tier_name: { type: string }
        next_tier_at:
          type: integer
          nullable: true
        cooldown_reduction_pct: { type: integer }
        available_hug_types:
          type: array
          items:
            $ref: '#/components/schemas/HugType'
        bonus_coins: { type: integer }

    ConnectionItem:
      type: object
      required:
        - user_id
        - username
        - intimacy
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
        intimacy:
          $ref: '#/components/schemas/IntimacyInfo'

    IntimacyLeaderboardEntry:
      type: object
      required:
        - user_a_id
        - user_a_username
        - user_b_id
        - user_b_username
        - raw_score
        - tier
        - tier_name
      properties:
        user_a_id: { type: string, format: uuid }
        user_a_username: { type: string }
        user_a_display_name:
          type: string
          nullable: true
        user_b_id: { type: string, format: uuid }
        user_b_username: { type: string }
        user_b_display_name:
          type: string
          nullable: true
        raw_score: { type: integer }
        tier: { type: integer }
        tier_name: { type: string }

    Balance:
      type: object
      required:
        - user_id
        - amount
      properties:
        user_id: { type: string, format: uuid }
        amount: { type: integer }

    Hug:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - status
        - hug_type
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        receiver_username: { type: string }
        receiver_gender: { $ref: '#/components/schemas/Gender' }
        status: { type: string, enum: [pending, completed, declined, expired, cancelled] }
        hug_type: { $ref: '#/components/schemas/HugType' }
        created_at: { type: string, format: date-time }
        accepted_at: { type: string, format: date-time }
        comment:
          type: string
          nullable: true
          maxLength: 140

    HugFeedItem:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - giver_username
        - receiver_username
        - hug_type
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        giver_username: { type: string }
        receiver_username: { type: string }
        giver_gender:
          $ref: '#/components/schemas/Gender'
        giver_display_name:
          type: string
          nullable: true
        receiver_display_name:
          type: string
          nullable: true
        hug_type: { $ref: '#/components/schemas/HugType' }
        created_at: { type: string, format: date-time }
        has_comment: { type: boolean }
        streak_tier:
          type: string
          description: Streak tier key stamped at hug completion (empty if no streak)

    CooldownInfo:
      type: object
      required:
        - user_a_id
        - user_b_id
        - cooldown_seconds
        - remaining_seconds
        - can_hug
        - effective_cooldown_seconds
        - intimacy_reduction_pct
      properties:
        user_a_id: { type: string, format: uuid }
        user_b_id: { type: string, format: uuid }
        cooldown_seconds: { type: integer }
        remaining_seconds: { type: integer }
        can_hug: { type: boolean }
        decline_cooldown_remaining: { type: integer }
        effective_cooldown_seconds: { type: integer }
        intimacy_reduction_pct: { type: integer }

    UserProfile:
      type: object
      required:
        - id
        - username
        - role
        - hugs_given
        - hugs_received
        - total_hugs
        - rank
        - captcha_type
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        special_tag:
          type: string
          nullable: true
        hugs_given: { type: integer }
        hugs_received: { type: integer }
        total_hugs: { type: integer }
        rank: { type: string }
        balance: { type: integer }
        mutual_total: { type: integer }
        mutual_given: { type: integer }
        mutual_received: { type: integer }
        is_blocked: { type: boolean }
        intimacy:
          $ref: '#/components/schemas/IntimacyInfo'
        captcha_type:
          $ref: '#/components/schemas/CaptchaType'
        captcha_cooldown_until:
          type: string
          format: date-time
          nullable: true

    LeaderboardEntry:
      type: object
      required:
        - user_id
        - username
        - total_hugs
        - hugs_given
        - hugs_received
        - rank
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        display_name:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        special_tag:
          type: string
          nullable: true
        total_hugs: { type: integer }
        hugs_given: { type: integer }
        hugs_received: { type: integer }
        rank: { type: string }

    DailyRewardResponse:
      type: object
      required:
        - amount
        - streak_days
        - new_balance
      properties:
        amount: { type: integer }
        streak_days: { type: integer }
        new_balance: { type: integer }
        already_claimed: { type: boolean }

    UserListItem:
      type: object
      required:
        - id
        - username
        - role
        - is_telegram_linked
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        special_tag:
          type: string
          nullable: true
        is_telegram_linked: { type: boolean }
        is_recently_active:
          type: boolean
          description: True if the user was active recently
        avg_response_time:
          type: number
          nullable: true
          description: Average response time in seconds
        promoted_until:
          type: string
          format: date-time
          nullable: true
        promotion_message:
          type: string
          nullable: true
        promotion_bid:
          type: integer
          description: Current bid for this promotion spot
        vip_remaining_seconds:
          type: integer
          description: Remaining VIP time in seconds
        vip_cooldown_until:
          type: string
          format: date-time
          nullable: true
          description: When the user can bid again

    PromoteUserRequest:
      type: object
      required:
        - bid
      properties:
        bid:
          type: integer
          minimum: 1
          description: Amount of coins to bid for a spot
        message:
          type: string
          maxLength: 100
          description: Optional promotion message

    HugActivityItem:
      type: object
      required:
        - timestamp
        - count
      properties:
        timestamp: { type: string, format: date-time }
        count: { type: integer }

    PendingHugInboxItem:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - giver_username
        - hug_type
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        giver_username: { type: string }
        giver_gender:
          $ref: '#/components/schemas/Gender'
        giver_display_name:
          type: string
          nullable: true
        hug_type: { $ref: '#/components/schemas/HugType' }
        created_at: { type: string, format: date-time }
        comment:
          type: string
          nullable: true
          maxLength: 140

    OutgoingPendingHug:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - receiver_username
        - hug_type
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        receiver_username: { type: string }
        receiver_gender:
          $ref: '#/components/schemas/Gender'
        receiver_display_name:
          type: string
          nullable: true
        hug_type: { $ref: '#/components/schemas/HugType' }
        created_at: { type: string, format: date-time }
        comment:
          type: string
          nullable: true
          maxLength: 140

    HugSlotInfo:
      type: object
      required:
        - total_slots
        - used_slots
      properties:
        total_slots: { type: integer }
        used_slots: { type: integer }
        next_slot_cost:
          type: integer
          nullable: true
          description: Cost of the next slot in coins, null if at max

    OutgoingHugsResponse:
      type: object
      required:
        - hugs
        - slots
      properties:
        hugs:
          type: array
          items:
            $ref: '#/components/schemas/OutgoingPendingHug'
        slots:
          $ref: '#/components/schemas/HugSlotInfo'

    BuySlotResponse:
      type: object
      required:
        - slots
        - new_balance
      properties:
        slots:
          $ref: '#/components/schemas/HugSlotInfo'
        new_balance: { type: integer }

    InboxCount:
      type: object
      required:
        - count
      properties:
        count: { type: integer }

    HugDetail:
      type: object
      required:
        - id
        - giver_id
        - receiver_id
        - giver_username
        - receiver_username
        - status
        - hug_type
        - created_at
      properties:
        id: { type: string, format: uuid }
        giver_id: { type: string, format: uuid }
        receiver_id: { type: string, format: uuid }
        giver_username: { type: string }
        receiver_username: { type: string }
        giver_gender:
          $ref: '#/components/schemas/Gender'
        giver_display_name:
          type: string
          nullable: true
        receiver_display_name:
          type: string
          nullable: true
        status: { type: string, enum: [pending, completed, declined, expired, cancelled] }
        hug_type: { $ref: '#/components/schemas/HugType' }
        created_at: { type: string, format: date-time }
        accepted_at:
          type: string
          format: date-time
          nullable: true
        comment:
          type: string
          nullable: true
          maxLength: 140
        streak_tier:
          type: string
          description: Streak tier key stamped at hug completion

    AdminUser:
      type: object
      required:
        - id
        - username
        - role
        - balance
        - captcha_type
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [user, admin] }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        special_tag:
          type: string
          nullable: true
        banned_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        last_visit_at:
          type: string
          format: date-time
          nullable: true
        balance: { type: integer }
        captcha_type:
          $ref: '#/components/schemas/CaptchaType'
        captcha_cooldown_until:
          type: string
          format: date-time
          nullable: true
        promoted_until:
          type: string
          format: date-time
          nullable: true
        promotion_message:
          type: string
          nullable: true
        promotion_bid:
          type: integer
          description: Current bid for this promotion spot
        vip_remaining_seconds:
          type: integer
          description: Remaining VIP time in seconds
        vip_cooldown_until:
          type: string
          format: date-time
          nullable: true
          description: When the user can bid again

    AdminStats:
      type: object
      required:
        - total_users
        - banned_users
      properties:
        total_users: { type: integer }
        banned_users: { type: integer }

    BlockedUser:
      type: object
      required:
        - id
        - username
        - created_at
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        gender:
          $ref: '#/components/schemas/Gender'
        display_name:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        special_tag:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }

    StreakInfo:
      type: object
      required:
        - current_streak
        - best_streak
        - tier_level
        - tier_name
        - tier_key
        - a_hugged_today
        - b_hugged_today
      properties:
        current_streak: { type: integer }
        best_streak: { type: integer }
        tier_level: { type: integer }
        tier_name: { type: string }
        tier_key: { type: string }
        next_tier_at:
          type: integer
          nullable: true
        a_hugged_today: { type: boolean }
        b_hugged_today: { type: boolean }

    TopStreakEntry:
      type: object
      required:
        - user_id
        - username
        - current_streak
        - best_streak
        - tier_level
        - tier_name
        - tier_key
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        display_name:
          type: string
          nullable: true
        gender:
          $ref: '#/components/schemas/Gender'
        current_streak: { type: integer }
        best_streak: { type: integer }
        tier_level: { type: integer }
        tier_name: { type: string }
        tier_key: { type: string }

    StreakCalendarDay:
      type: object
      required:
        - date
        - hug_count
        - completed
      properties:
        date: { type: string, format: date }
        hug_count: { type: integer }
        completed: { type: boolean }

    PairStreakResponse:
      type: object
      required:
        - streak
        - calendar
      properties:
        streak:
          $ref: '#/components/schemas/StreakInfo'
        calendar:
          type: array
          items:
            $ref: '#/components/schemas/StreakCalendarDay'

    AnnouncementResponse:
      type: object
      required:
        - id
        - message
        - created_at
      properties:
        id: { type: string, format: uuid }
        message: { type: string }
        created_at: { type: string, format: date-time }

    SudokuPuzzleResponse:
      type: object
      required:
        - id
        - puzzle
      properties:
        id: { type: string, format: uuid }
        puzzle:
          type: array
          items:
            type: array
            items:
              type: integer
          description: "9x9 grid, 0 means empty"

    SudokuVerifyRequest:
      type: object
      required:
        - row
        - col
        - value
      properties:
        row: { type: integer, minimum: 0, maximum: 8 }
        col: { type: integer, minimum: 0, maximum: 8 }
        value: { type: integer, minimum: 1, maximum: 9 }

    SudokuVerifyResponse:
      type: object
      required:
        - correct
        - errors
      properties:
        correct: { type: boolean }
        errors: { type: integer }
        failed: { type: boolean, description: "True if errors > 3" }

    SudokuCompleteResponse:
      type: object
      required:
        - captcha_token
      properties:
        captcha_token: { type: string }

    CasinoCaptchaResponse:
      type: object
      required:
        - id
        - expires_at
      properties:
        id: { type: string, format: uuid }
        expires_at: { type: string, format: date-time }

    CasinoSpinResponse:
      type: object
      required:
        - win
      properties:
        win: { type: boolean }
        captcha_token:
          type: string
          description: Present only if win is true
        cooldown_until:
          type: string
          format: date-time
          description: Present only if win is false (10 min cooldown)

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit / cooldown active
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Gone:
      description: Resource expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /ping:
    get:
      summary: Ping endpoint
      operationId: getPing
      description: Returns a simple response to check if the server is alive
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status: { type: string }

  /admin/ping:
    get:
      summary: "admin ping (testing auth)"
      operationId: getAdminPing
      security:
        - BearerAuth: ["admin"]
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required:
                  - secret
                properties:
                  secret: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/check-username:
    get:
      summary: Check if a username is available
      operationId: checkUsername
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
      responses:
        '200':
          description: Username availability result
          content:
            application/json:
              schema:
                type: object
                required:
                  - available
                properties:
                  available: { type: boolean }
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                  username:
                    type: string
                    minLength: 3
                    maxLength: 32
                    pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
                    description: 'Username must be 3-32 characters, start with a letter, and contain only letters, numbers, and underscores'
                  password:
                    type: string
                    minLength: 8
                    maxLength: 128
                    description: 'Password must be 8-128 characters, contain at least one letter, one digit, and one special character'
                  gender:
                    $ref: '#/components/schemas/Gender'

              additionalProperties: false
      responses:
        '201':
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 32
                password:
                  type: string
                  minLength: 1
                  maxLength: 128
              additionalProperties: false
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token cookie
      operationId: refreshToken
      description: >
        Uses the HttpOnly refresh_token cookie to issue a new access token.
        No Authorization header required.
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New access token issued
          headers:
            Set-Cookie:
              description: Rotated refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/logout:
    post:
      summary: Logout and clear refresh token cookie
      operationId: logout
      description: Clears the HttpOnly refresh_token cookie.
      responses:
        '200':
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Clear refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message: { type: string }

  /auth/telegram/init:
    post:
      summary: Start a Telegram login session
      operationId: initTelegramLogin
      description: >
        Creates a new Telegram login session. Returns a bot deep-link URL and a
        poll token. The client should open the bot URL and poll /auth/telegram/poll.
      responses:
        '200':
          description: Login session created
          content:
            application/json:
              schema:
                type: object
                required:
                  - bot_url
                  - poll_token
                properties:
                  bot_url:
                    type: string
                    description: Telegram bot deep-link URL to open
                  poll_token:
                    type: string
                    description: Token for polling the login result
        '503':
          description: Telegram bot not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/telegram/poll:
    post:
      summary: Poll for Telegram login result
      operationId: pollTelegramLogin
      description: >
        Polls the status of a Telegram login session. Returns 202 while pending,
        200 with auth response on success, 403 if banned, 404 if expired/not found.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - poll_token
              properties:
                poll_token:
                  type: string
              additionalProperties: false
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '202':
          description: Login session still pending
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

