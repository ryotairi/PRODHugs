openapi: 3.0.3
info:
  title: Hugs as a Service API — v2
  version: 2.0.0
  description: |
    v2 surface for the PRODHugs platform. Spec-first, generated through
    `oapi-codegen` exactly like v1 (`oapi-codegen -config oapi-codegen-v2.yml
    api/openapi-v2.yaml`). Handlers live in `internal/transport/http/v2/`.

    v2 endpoints, on top of the v1 service layer:

      - GET /users/search supports an "@username" prefix that filters by
        username substring only (no display_name match).
      - GET /users/{usernameOrId}/profile accepts either a UUID or a username
        (optionally prefixed with "@") in the path.
      - GET /daily-reward/status is a read-only status check for the daily
        reward (claim availability and next-claim time).
      - GET/PUT/DELETE /users/{usernameOrId}/note manage the caller's private
        per-target note (1 note per pair, ≤256 Unicode code points). Self-
        notes are allowed by design.
      - GET /notes lists the caller's notes ordered by recent updates.

    v1 (/api/v1) is still served as legacy.

servers:
  - url: /api/v2

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    Gender:
      type: string
      enum: [male, female]

    HugType:
      type: string
      enum: [standard, bear, group, warm, soul]

    UserListItem:
      type: object
      required:
        - id
        - username
        - role
        - is_telegram_linked
        - is_recently_active
        - promotion_bid
        - vip_remaining_seconds
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender: { $ref: '#/components/schemas/Gender' }
        display_name: { type: string, nullable: true }
        tag: { type: string, nullable: true }
        special_tag: { type: string, nullable: true }
        is_telegram_linked: { type: boolean }
        is_recently_active: { type: boolean }
        avg_response_time: { type: number, nullable: true }
        promoted_until: { type: string, format: date-time, nullable: true }
        promotion_message: { type: string, nullable: true }
        promotion_bid: { type: integer }
        vip_remaining_seconds: { type: integer }
        vip_cooldown_until: { type: string, format: date-time, nullable: true }

    IntimacyInfo:
      type: object
      required:
        - raw_score
        - tier
        - tier_name
        - cooldown_reduction_pct
        - available_hug_types
        - bonus_coins
      properties:
        raw_score: { type: integer }
        tier: { type: integer }
        tier_name: { type: string }
        next_tier_at: { type: integer, nullable: true }
        cooldown_reduction_pct: { type: integer }
        available_hug_types:
          type: array
          items: { $ref: '#/components/schemas/HugType' }
        bonus_coins: { type: integer }

    UserProfile:
      type: object
      required:
        - id
        - username
        - role
        - hugs_given
        - hugs_received
        - total_hugs
        - rank
        - captcha_type
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
        gender: { $ref: '#/components/schemas/Gender' }
        display_name: { type: string, nullable: true }
        tag: { type: string, nullable: true }
        special_tag: { type: string, nullable: true }
        hugs_given: { type: integer }
        hugs_received: { type: integer }
        total_hugs: { type: integer }
        rank: { type: string }
        balance: { type: integer }
        mutual_total: { type: integer }
        mutual_given: { type: integer }
        mutual_received: { type: integer }
        is_blocked: { type: boolean }
        intimacy: { $ref: '#/components/schemas/IntimacyInfo' }
        captcha_type: { type: string }
        captcha_cooldown_until:
          type: string
          format: date-time
          nullable: true

    UserNote:
      type: object
      required: [target_id, content, updated_at]
      properties:
        target_id:
          type: string
          format: uuid
        target_username:
          type: string
          description: Only present in the list endpoint.
        target_display_name:
          type: string
          nullable: true
          description: Only present in the list endpoint.
        content:
          type: string
          minLength: 1
          maxLength: 256
        updated_at:
          type: string
          format: date-time

    UpsertUserNoteRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 256

    DailyRewardStatus:
      type: object
      required: [can_claim, next_claim_at, streak_days]
      properties:
        can_claim:
          type: boolean
          description: True when the reward has not been claimed today (UTC).
        next_claim_at:
          type: string
          format: date-time
          description: |
            UTC timestamp at which the next claim becomes available. Equal to
            the current time if `can_claim` is true.
        streak_days:
          type: integer
          description: Current daily streak in days. 0 if never claimed.
        last_claimed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last successful claim, if any.

paths:
  /users/search:
    get:
      summary: Search users (supports @username prefix)
      description: |
        Substring search across username and display_name. When the `q`
        parameter starts with `@`, the leading `@` is stripped and the
        remainder is matched against `username` only — display_name matches
        are dropped.
      operationId: searchUsersV2
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, maxLength: 64 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: List of matching users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserListItem' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{usernameOrId}/profile:
    get:
      summary: Get user profile (by UUID or username)
      description: |
        Accepts a UUID or a username in the path. A leading `@` on the
        username is allowed and stripped server-side.
      operationId: getUserProfileV2
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: usernameOrId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{usernameOrId}/note:
    parameters:
      - name: usernameOrId
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get the caller's note about the target user
      operationId: getUserNoteV2
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: The note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserNote' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Create or update the caller's note about the target user
      operationId: upsertUserNoteV2
      security:
        - BearerAuth: ["user", "admin"]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertUserNoteRequest' }
      responses:
        '200':
          description: Note created or updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserNote' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete the caller's note about the target user
      operationId: deleteUserNoteV2
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '204':
          description: Deleted (or never existed)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notes:
    get:
      summary: List the caller's notes
      operationId: listUserNotesV2
      security:
        - BearerAuth: ["user", "admin"]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: List of notes authored by the caller
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserNote' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /daily-reward/status:
    get:
      summary: Get daily-reward status
      description: |
        Read-only status of the caller's daily reward. Use this to render the
        claim button state on mount without performing a claim.
      operationId: getDailyRewardStatus
      security:
        - BearerAuth: ["user", "admin"]
      responses:
        '200':
          description: Current status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DailyRewardStatus' }
        '401':
          $ref: '#/components/responses/Unauthorized'
