volumes:
  pg_data:

services:
  nginx:
    container_name: nginx-dev
    image: nginx:alpine
    ports:
      - "${DEV_PORT:-3001}:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:Z,ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  frontend:
    container_name: frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app:Z,cached
      - /app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development

  backend:
    container_name: backend-dev
    image: cosmtrek/air
    ports:
      - "${SERVER_PORT:-8097}:8080"
    volumes:
      - ./backend/:/app/service:Z,cached
      - /go/pkg/mod
    working_dir: /app/service
    environment:
      AIR_WD: /app/service
      SERVER_ADDR: "0.0.0.0:8080"
      POSTGRES_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      POSTGRES_MAX_CONNS: "${POSTGRES_MAX_CONNS}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-false}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://localhost:3001}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
      MATRIX_HOMESERVER_URL: "${MATRIX_HOMESERVER_URL}"
      MATRIX_USER_ID: "${MATRIX_USER_ID}"
      MATRIX_ACCESS_TOKEN: "${MATRIX_ACCESS_TOKEN}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres-dev
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
