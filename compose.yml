volumes:
  pg_data:

services:
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:Z,ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    restart: unless-stopped

  backend:
    container_name: backend
    build:
      context: ./backend
    environment:
      SERVER_ADDR: "0.0.0.0:8080"
      METRICS_ADDR: "0.0.0.0:9090"
      POSTGRES_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      POSTGRES_MAX_CONNS: "${POSTGRES_MAX_CONNS}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-true}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
      MATRIX_HOMESERVER_URL: "${MATRIX_HOMESERVER_URL}"
      MATRIX_USER_ID: "${MATRIX_USER_ID}"
      MATRIX_ACCESS_TOKEN: "${MATRIX_ACCESS_TOKEN}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx-exporter:
    container_name: nginx-exporter
    image: nginx/nginx-prometheus-exporter:latest
    command: ["--nginx.scrape-uri=http://nginx:80/nginx_status"]
    restart: unless-stopped
    depends_on:
      - nginx

  alloy:
    container_name: alloy
    image: grafana/alloy:latest
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:Z,ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      GRAFANA_CLOUD_PROMETHEUS_URL: "${GRAFANA_CLOUD_PROMETHEUS_URL}"
      GRAFANA_CLOUD_PROMETHEUS_USERNAME: "${GRAFANA_CLOUD_PROMETHEUS_USERNAME}"
      GRAFANA_CLOUD_API_KEY: "${GRAFANA_CLOUD_API_KEY}"
      GRAFANA_CLOUD_LOKI_URL: "${GRAFANA_CLOUD_LOKI_URL}"
      GRAFANA_CLOUD_LOKI_USERNAME: "${GRAFANA_CLOUD_LOKI_USERNAME}"
    restart: unless-stopped
    depends_on:
      - backend
      - nginx
      - nginx-exporter
