name: PR checks

# PR-time quality gates. Runs on every pull_request, builds a Markdown
# report per area (backend / frontend), and uploads it as an artifact for
# pr-comment.yml to post on the PR.
#
# This workflow itself has read-only permissions because GitHub downgrades
# the GITHUB_TOKEN to read-only for PRs from forks — the `permissions:` block
# can't grant what isn't there. The companion pr-comment workflow runs in
# the base-repo context (via `workflow_run`) with full write permissions and
# does the actual commenting.

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/pr-checks.yml'
              - '.github/workflows/pr-comment.yml'
              - '.github/scripts/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/pr-checks.yml'
              - '.github/workflows/pr-comment.yml'
              - '.github/scripts/**'

  backend:
    name: Backend checks
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install codegen + lint tooling
        # golangci-lint must be compiled with a Go toolchain >= the project's
        # go.mod (1.25). The published binaries lag, so we go install from
        # source — slower the first time, but compatible.
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.0
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gofmt
        id: gofmt
        continue-on-error: true
        run: |
          unformatted=$(gofmt -l . | grep -v "sqlc/storage/\|v1/api.gen.go\|v2/api.gen.go" || true)
          if [ -n "$unformatted" ]; then
            {
              echo "These files would be reformatted by gofmt:"
              echo
              echo "$unformatted"
            } > "$RUNNER_TEMP/gofmt.out"
            cat "$RUNNER_TEMP/gofmt.out"
            exit 1
          fi

      - name: go vet
        id: vet
        continue-on-error: true
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee "$RUNNER_TEMP/vet.out"

      - name: go build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          go build ./... 2>&1 | tee "$RUNNER_TEMP/build.out"

      - name: go test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          go test -race -count=1 ./... 2>&1 | tee "$RUNNER_TEMP/test.out"

      - name: golangci-lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          golangci-lint run --timeout=5m 2>&1 | tee "$RUNNER_TEMP/lint.out"
          status=${PIPESTATUS[0]}
          # Post-process the capture to emit GitHub workflow annotations so
          # each lint issue appears inline on the PR diff. File paths in the
          # capture are relative to backend/; rewrite them to be repo-rooted
          # so GitHub matches them against changed files.
          while IFS= read -r line; do
            if [[ "$line" =~ ^([^[:space:]][^:]*\.go):([0-9]+):([0-9]+):[[:space:]]*(.*)$ ]]; then
              printf '::error file=backend/%s,line=%s,col=%s::%s\n' \
                "${BASH_REMATCH[1]}" "${BASH_REMATCH[2]}" "${BASH_REMATCH[3]}" "${BASH_REMATCH[4]}"
            fi
          done < "$RUNNER_TEMP/lint.out"
          exit "$status"

      - name: OpenAPI codegen drift (v1)
        id: oapi_v1
        continue-on-error: true
        run: |
          oapi-codegen -config oapi-codegen.yml api/openapi.yaml
          if ! git diff --exit-code -- internal/transport/http/v1/api.gen.go; then
            {
              echo "internal/transport/http/v1/api.gen.go is out of sync with api/openapi.yaml."
              echo
              git diff --stat -- internal/transport/http/v1/api.gen.go
            } > "$RUNNER_TEMP/oapi_v1.out"
            exit 1
          fi

      - name: OpenAPI codegen drift (v2)
        id: oapi_v2
        continue-on-error: true
        run: |
          oapi-codegen -config oapi-codegen-v2.yml api/openapi-v2.yaml
          if ! git diff --exit-code -- internal/transport/http/v2/api.gen.go; then
            {
              echo "internal/transport/http/v2/api.gen.go is out of sync with api/openapi-v2.yaml."
              echo
              git diff --stat -- internal/transport/http/v2/api.gen.go
            } > "$RUNNER_TEMP/oapi_v2.out"
            exit 1
          fi

      - name: sqlc codegen drift
        id: sqlc
        continue-on-error: true
        run: |
          sqlc generate -f internal/db/sqlc/sqlc.yaml
          if ! git diff --exit-code -- internal/db/sqlc/storage/; then
            {
              echo "internal/db/sqlc/storage/ is out of sync with the queries."
              echo
              git diff --stat -- internal/db/sqlc/storage/
            } > "$RUNNER_TEMP/sqlc.out"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Docker image builds
        id: docker
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          load: false
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,mode=max,scope=backend-pr

      - name: Render report
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          R_GOFMT: ${{ steps.gofmt.outcome }}
          R_VET: ${{ steps.vet.outcome }}
          R_BUILD: ${{ steps.build.outcome }}
          R_TEST: ${{ steps.test.outcome }}
          R_LINT: ${{ steps.lint.outcome }}
          R_OAPI_V1: ${{ steps.oapi_v1.outcome }}
          R_OAPI_V2: ${{ steps.oapi_v2.outcome }}
          R_SQLC: ${{ steps.sqlc.outcome }}
          R_DOCKER: ${{ steps.docker.outcome }}
        run: bash .github/scripts/summarize.sh backend

      - name: Stage artifact
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$RUNNER_TEMP/pr-artifact"
          cp "$RUNNER_TEMP/report.md" "$RUNNER_TEMP/pr-artifact/report.md"
          echo "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-artifact/pr-number.txt"
          echo "backend-pr-checks" > "$RUNNER_TEMP/pr-artifact/marker.txt"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-backend
          path: ${{ runner.temp }}/pr-artifact/
          if-no-files-found: error
          retention-days: 7

      - name: Conclude
        if: always()
        env:
          OUTCOMES: ${{ steps.gofmt.outcome }} ${{ steps.vet.outcome }} ${{ steps.build.outcome }} ${{ steps.test.outcome }} ${{ steps.lint.outcome }} ${{ steps.oapi_v1.outcome }} ${{ steps.oapi_v2.outcome }} ${{ steps.sqlc.outcome }} ${{ steps.docker.outcome }}
        run: |
          for o in $OUTCOMES; do
            if [ "$o" = "failure" ]; then
              echo "Backend job failed; see the PR comment for details."
              exit 1
            fi
          done

  frontend:
    name: Frontend checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        id: oxlint
        continue-on-error: true
        run: |
          set -o pipefail
          bun run lint:oxlint 2>&1 | tee "$RUNNER_TEMP/oxlint.out"

      - name: Lint (eslint)
        id: eslint
        continue-on-error: true
        run: |
          set -o pipefail
          # Skip --fix in CI; humans should commit fixes deliberately.
          bun x eslint . --cache --no-warn-ignored 2>&1 | tee "$RUNNER_TEMP/eslint.out"

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          bun run type-check 2>&1 | tee "$RUNNER_TEMP/typecheck.out"

      - name: Build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          bun run build-only 2>&1 | tee "$RUNNER_TEMP/build.out"

      - uses: docker/setup-buildx-action@v4

      - name: Docker image builds
        id: docker
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          load: false
          cache-from: type=gha,scope=frontend-pr
          cache-to: type=gha,mode=max,scope=frontend-pr

      - name: Render report
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          R_OXLINT: ${{ steps.oxlint.outcome }}
          R_ESLINT: ${{ steps.eslint.outcome }}
          R_TYPECHECK: ${{ steps.typecheck.outcome }}
          R_BUILD: ${{ steps.build.outcome }}
          R_DOCKER: ${{ steps.docker.outcome }}
        run: bash .github/scripts/summarize.sh frontend

      - name: Stage artifact
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p "$RUNNER_TEMP/pr-artifact"
          cp "$RUNNER_TEMP/report.md" "$RUNNER_TEMP/pr-artifact/report.md"
          echo "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-artifact/pr-number.txt"
          echo "frontend-pr-checks" > "$RUNNER_TEMP/pr-artifact/marker.txt"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-frontend
          path: ${{ runner.temp }}/pr-artifact/
          if-no-files-found: error
          retention-days: 7

      - name: Conclude
        if: always()
        env:
          OUTCOMES: ${{ steps.oxlint.outcome }} ${{ steps.eslint.outcome }} ${{ steps.typecheck.outcome }} ${{ steps.build.outcome }} ${{ steps.docker.outcome }}
        run: |
          for o in $OUTCOMES; do
            if [ "$o" = "failure" ]; then
              echo "Frontend job failed; see the PR comment for details."
              exit 1
            fi
          done
