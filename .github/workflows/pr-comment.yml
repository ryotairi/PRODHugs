name: PR comment

# Posts the CI report on the PR. Triggered by workflow_run because the
# pr-checks workflow runs with a read-only GITHUB_TOKEN on fork PRs (GitHub
# downgrades it for security) and cannot create comments. workflow_run runs
# in the base-repo context with a normal token, so it can.
#
# Security: we ONLY read artifacts (text reports) and ONLY post comments.
# We never check out or execute any PR-author code under these elevated
# permissions.

on:
  workflow_run:
    workflows: ["PR checks"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  # Pre-empt the September 2026 deprecation: explicitly run Node-based
  # actions on Node 24 even though the runner default is still 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  comment:
    name: Post / update PR comment
    runs-on: ubuntu-latest
    # Originating event must be a PR (workflow_dispatch from the comment bot
    # also lands here because it bubbles up under workflow_run; we'll cope by
    # falling through if the artifact has no PR number).
    if: ${{ github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - name: Download backend report
        id: dl_backend
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: pr-report-backend
          path: ${{ runner.temp }}/backend-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend report
        id: dl_frontend
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: pr-report-frontend
          path: ${{ runner.temp }}/frontend-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comments
        uses: actions/github-script@v9
        env:
          BACKEND_DIR: ${{ runner.temp }}/backend-report
          FRONTEND_DIR: ${{ runner.temp }}/frontend-report
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const post = require('./.github/scripts/post-comment.js');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function maybePost(dir) {
              if (!fs.existsSync(dir)) {
                core.info(`no artifact at ${dir} — skipping (likely the target wasn't built this run)`);
                return;
              }
              const bodyPath = path.join(dir, 'report.md');
              const numberPath = path.join(dir, 'pr-number.txt');
              const markerPath = path.join(dir, 'marker.txt');
              for (const f of [bodyPath, numberPath, markerPath]) {
                if (!fs.existsSync(f)) {
                  core.warning(`incomplete artifact at ${dir}: missing ${path.basename(f)}`);
                  return;
                }
              }
              const body = fs.readFileSync(bodyPath, 'utf8');
              const issueNumber = parseInt(fs.readFileSync(numberPath, 'utf8').trim(), 10);
              const marker = fs.readFileSync(markerPath, 'utf8').trim();
              if (!Number.isFinite(issueNumber) || issueNumber <= 0) {
                core.warning(`artifact at ${dir} has invalid pr-number: ${issueNumber}`);
                return;
              }
              await post({ github, core, owner, repo, issueNumber, body, marker });
            }

            await maybePost(process.env.BACKEND_DIR);
            await maybePost(process.env.FRONTEND_DIR);
